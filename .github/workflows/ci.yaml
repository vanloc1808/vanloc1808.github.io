name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Check for lock file
        run: |
          if [ ! -f yarn.lock ]; then
            echo "Error: yarn.lock not found. Please commit the lock file." >&2
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run type checking
        run: yarn type-check

      - name: Run linting
        run: yarn lint

      - name: Check formatting
        run: yarn format:check

      - name: Build application
        run: yarn build

  build-docker:
    needs: [test-and-lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: vanloc1808
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push portfolio
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: vanloc1808/portfolio:latest
          cache-from: type=registry,ref=vanloc1808/portfolio:buildcache
          cache-to: type=registry,ref=vanloc1808/portfolio:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
