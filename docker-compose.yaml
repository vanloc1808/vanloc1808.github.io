version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: vanloc1808/portfolio:latest
    container_name: portfolio-frontend
    env_file:
      - .env
    ports:
      - '3000'
    restart: always
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.portfolio.rule=Host(`nguyenvanloc.com`) || Host(`www.nguyenvanloc.com`)'
      - 'traefik.http.routers.portfolio.entrypoints=websecure'
      - 'traefik.http.routers.portfolio.tls=true'
      - 'traefik.http.routers.portfolio.service=portfolio'
      - 'traefik.http.services.portfolio.loadbalancer.server.port=3000'
    networks:
      - localnet
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  localnet:
    external: true
    name: localnet
