  <!-- Diamond rule -->
  <rect x="13" y="13" width="38" height="38" rx="3" transform="rotate(45 32 32)"
    fill="none" stroke="#f5c542" stroke-width="1.4"/>
  <!-- VL monogram -->
  <text x="32" y="34"
    font-family="Cormorant Garamond, Georgia, serif"
